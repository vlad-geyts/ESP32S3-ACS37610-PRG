; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; Only build the ESP32 env when using the Build button / pio run.
; Native env is test-only: run it with  pio test -e native
[platformio]
default_envs = esp32-s3-devkitc-1-n16r8v

[env:esp32-s3-devkitc-1-n16r8v]
platform = espressif32
board = esp32-s3-devkitc-1-n16r8v
framework = arduino

; Optimization: Set CPU frequency to max (240MHz)
board_build.f_cpu = 240000000L

; Flash & RAM settings for WROOM-1 (OPI PSRAM)
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_upload.flash_size = 16MB

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags:
build_unflags =
     -std=gnu++11    

build_flags =
    ;-std=gnu++17
    -std=gnu++17 -O2
    ; Set these to 0 to use the CH343 UART Bridge
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0

    ; to enable PSRAM access in code
    -D BOARD_HAS_PSRAM 
    -mfix-esp32-psram-cache-issue

    ; disable unused peripheral clocks at boot:
    -DCONFIG_ESP32S3_DEFAULT_CPU_FREQ_240
    -DCONFIG_PM_ENABLE=y  ; Enables power management to auto-gate unused blocks

lib_deps =
    adafruit/Adafruit BusIO @ ^1.17.0
    adafruit/Adafruit NeoPixel@^1.12.0

; Native environment — runs CRC/logic unit tests on PC, no hardware required.
; lib/crc3/ is found automatically by PlatformIO LDF for both firmware and tests.
; main.cpp is excluded (Arduino-specific, won't compile on native).
[env:native]
platform = native
build_flags = -std=gnu++17
build_src_filter = -<*>


